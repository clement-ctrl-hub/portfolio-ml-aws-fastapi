name: CI FastAPI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lancer les tests
        run: |
          python -m pytest -v

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: tests

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer les identifiants AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Se connecter à Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construire l'image Docker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

      - name: Publier l'image Docker
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
  deploy-ec2:
    runs-on: ubuntu-latest
    needs: docker-build-and-push

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configurer les identifiants AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Déployer l'image sur EC2 avec SSM
        id: deploy
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          AWS_ACCOUNT_ID: "521855441310"
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy portfolio ML API" \
            --parameters commands="[
              \"set -e\",
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}\",
              \"docker pull ${IMAGE_URI}\",
              \"docker stop portfolio-ml-api || true\",
              \"docker rm portfolio-ml-api || true\",
              \"docker run -d --name portfolio-ml-api --restart unless-stopped -p 8000:8000 ${IMAGE_URI}\",
              \"for i in \$(seq 1 36); do echo Tentative \$i/36; if curl --fail --silent --show-error http://localhost:8000/health; then echo API opérationnelle; exit 0; fi; sleep 5; done; echo API indisponible; docker ps -a; docker logs --tail 200 portfolio-ml-api; exit 1\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          if ! aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"; then

            echo "Le déploiement SSM a échoué."

            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query '{
                Status:Status,
                Output:StandardOutputContent,
                Errors:StandardErrorContent
              }'

            exit 1
          fi

      - name: Afficher le résultat du déploiement
        env:
          COMMAND_ID: ${{ steps.deploy.outputs.command_id }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{
              Status:Status,
              Output:StandardOutputContent,
              Errors:StandardErrorContent
            }'        